name: Bug Report
description: Report a bug with the Melitta Barista Smart integration
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below.
  - type: input
    id: version
    attributes:
      label: Integration version
      placeholder: "e.g. 0.27.0"
    validations:
      required: true
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "e.g. 2026.3.1"
    validations:
      required: true
  - type: dropdown
    id: machine_model
    attributes:
      label: Machine model
      options:
        - Barista T Smart
        - Barista TS Smart
        - Unknown / Other
    validations:
      required: true
  - type: dropdown
    id: connection
    attributes:
      label: BLE connection type
      options:
        - ESPHome BLE proxy (recommended / primary tested path)
        - Local Bluetooth adapter
    validations:
      required: true
  - type: input
    id: ble_adapter
    attributes:
      label: BLE adapter — chipset / model
      description: |
        Be specific. Examples:
          • ESPHome proxy: "Seeed XIAO ESP32-C6, ESPHome 2024.10 bluetooth_proxy"
          • USB dongle: "TP-Link UB500 (RTL8761B)" or "CSR8510 USB dongle"
          • Host built-in: "Raspberry Pi 5 onboard (CYW43455)" / "Intel AX210"
        We need this to update the Hardware Compatibility List
        (https://github.com/dzerik/melitta-barista-ha/blob/main/HCL.md) and
        to route triage. Local-adapter / BlueZ quirks tend to be
        chipset-specific.
      placeholder: "e.g. Seeed XIAO ESP32-C6 (ESPHome bluetooth_proxy)"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Enable debug logging and paste relevant logs:
        ```yaml
        logger:
          logs:
            melitta_barista: debug
        ```
      render: text
